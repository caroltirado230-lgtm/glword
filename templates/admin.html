<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Glword</title>
    <style>
        body { background: #0f0f12; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .admin-box { background: #18181d; padding: 40px; border-radius: 12px; border: 2px solid #e91e63; box-shadow: 0px 4px 20px rgba(233, 30, 99, 0.3); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #e91e63; margin-bottom: 25px; }
        label { display: block; color: #aaa; margin-top: 15px; margin-bottom: 5px; font-weight: 500; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; font-size: 14px; }
        select option { background: #222; color: white; }
        button { width: 100%; background: #e91e63; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #c2185b; }
        .volver { display: block; text-align: center; margin-top: 15px; color: #aaa; text-decoration: none; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Subir Contenido</h2>
        <form action="/agregar_contenido" method="POST">
            <label for="tipo">Tipo de Contenido:</label>
            <select name="tipo" id="tipo" required>
                <option value="">-- Selecciona --</option>
                <option value="serie">Serie</option>
                <option value="pelicula">Película</option>
            </select>

            <label for="titulo">Título:</label>
            <input type="text" name="titulo" id="titulo" placeholder="Ej: GAP o Mi Película Favorita" required>

            <label for="portada">Link de la imagen de portada:</label>
            <input type="text" name="portada" id="portada" placeholder="https://ejemplo.com/portada.jpg" required>

            <label for="nombre_capitulo">Nombre del Capítulo/Película:</label>
            <input type="text" name="nombre_capitulo" id="nombre_capitulo" placeholder="Ej: Capítulo 1 o Película Completa" required>

            <label for="url_video">Link del video:</label>
            <input type="url" name="url_video" id="url_video" placeholder="https://ejemplo.com/video" required>
            
            <button type="submit">Guardar y Publicar</button>
        </form>
        <a href="/" class="volver">Volver a la página principal</a>
    </div>

</body>
</html>
