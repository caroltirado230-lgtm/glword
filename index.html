<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glword - Streaming GL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        
        <!-- VISTA 1: CATÁLOGO PRINCIPAL -->
        <div id="catalogView">
            <!-- Banner Principal -->
            <div class="hero-banner">
                <div class="hero-overlay">
                    <h1>GLWORD SERIES</h1>
                </div>
            </div>

            <!-- Cuadrícula de Novedades -->
            <section class="gallery-section">
                <h3>Novedades</h3>
                <div id="videosGrid" class="catalog-grid">
                    <!-- JavaScript dibujará las portadas aquí -->
                </div>
            </section>
        </div>

        <!-- VISTA 2: PÁGINA DE DETALLES DE LA SERIE -->
        <div id="detailsView" class="details-view" style="display: none;">
            <button id="backBtn" class="back-btn">← Volver al Catálogo</button>
            
            <div class="movie-container">
                <h2 id="serieTitle">Título de la Serie</h2>
                
                <div class="video-wrapper">
                    <!-- Contenedor genérico interactivo para los reproductores externos -->
                    <div id="okRuPlayerContainer" class="embed-player-container"></div>
                </div>

                <div class="serie-meta">
                    <p id="serieDescription">Sinopsis de la serie.</p>
                </div>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
